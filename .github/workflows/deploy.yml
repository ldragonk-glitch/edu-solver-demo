name: Deploy to Lighthouse

# 触发条件:
# 1. push 到 main 分支自动跑
# 2. Actions 选项卡里手动点 "Run workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只跑一个 deploy, 后到的取消旧的
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 1. 把 base64 编码的私钥解码到 ~/.ssh
      #    secret LIGHTHOUSE_SSH_KEY 存 base64, 这样长字符串复制粘贴不会被 OrcaTerm 等终端误处理
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.LIGHTHOUSE_SSH_KEY }}" | base64 -d > ~/.ssh/id_lighthouse
          chmod 600 ~/.ssh/id_lighthouse
          # 验证私钥格式: 输出 fingerprint 说明 key 文件 OK
          ssh-keygen -l -f ~/.ssh/id_lighthouse
          # 把目标主机加到 known_hosts 避免首次询问
          ssh-keyscan -H "${{ secrets.LIGHTHOUSE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # 2. SSH 进 server 跑 deploy 脚本
      #    先 git pull 拿最新代码 (防止 deploy.sh 还没在服务器上的鸡生蛋情况),
      #    再跑 scripts/deploy.sh 走完整流程
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_lighthouse \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.LIGHTHOUSE_USER }}@${{ secrets.LIGHTHOUSE_HOST }}" \
              'cd /opt/edu-solver && git fetch origin main && git reset --hard origin/main && bash scripts/deploy.sh'
